# Render Blueprint — deploy with: Render dashboard → New → Blueprint → connect this repo.
# A persistent disk holds data/state.json (bids + sold items) so nothing is lost
# across deploys/restarts. ADMIN_PASSWORD is NOT in this file — set it in the
# dashboard (Environment) so the secret never lands in git.
services:
  - type: web
    name: moving-sale
    env: node
    plan: starter          # required for a persistent disk (free plan has none)
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/items
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_PASSWORD
        sync: false          # prompts you to set it in the dashboard
                             # (required in production — the app won't start with the default)
      # Optional email alerts on new requests. Set all three in the dashboard to
      # enable; leave unset to keep notifications off.
      - key: SMTP_URL
        sync: false          # e.g. smtps://user:pass@smtp.example.com:465
      - key: NOTIFY_EMAIL
        sync: false          # seller address that receives new-request alerts
      - key: NOTIFY_FROM
        sync: false          # From address (defaults to NOTIFY_EMAIL)
    disk:
      name: sale-data
      mountPath: /var/data
      sizeGB: 1
